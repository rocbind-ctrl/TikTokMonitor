<aside class="sidebar">
  <div class="sidebar-brand">
    <svg class="sidebar-logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <rect width="32" height="32" rx="9" fill="var(--accent)"/>
      <path d="M12 10v12l10-6-10-6z" fill="#fff"/>
    </svg>
    <div class="sidebar-brand-text">
      <strong>TikTok Monitor</strong>
      <span>账号数据面板</span>
    </div>
  </div>
  <nav class="sidebar-nav" aria-label="主导航">
    <a href="/" class="sidebar-link{% if active_nav == 'home' %} active{% endif %}">
      <svg class="sidebar-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8.5 10 3l7 5.5V16a1.5 1.5 0 0 1-1.5 1.5H4.5A1.5 1.5 0 0 1 3 16V8.5z"/><path d="M8 17.5V11h4v6.5"/></svg>
      <span>首页</span>
    </a>
    <a href="/insights" class="sidebar-link{% if active_nav == 'insights' %} active{% endif %}">
      <svg class="sidebar-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 15V9M8 15V5M12 15v-4M16 15V7"/></svg>
      <span>数据分析</span>
    </a>
    <a href="/alerts" class="sidebar-link{% if active_nav == 'alerts' %} active{% endif %}">
      <svg class="sidebar-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 3a5 5 0 0 1 5 5v2.5l1.5 2.5H3.5L5 10.5V8a5 5 0 0 1 5-5z"/><path d="M8.5 15.5a1.5 1.5 0 0 0 3 0"/></svg>
      <span>告警</span>
    </a>
    <a href="/logs" class="sidebar-link{% if active_nav == 'logs' %} active{% endif %}">
      <svg class="sidebar-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4h10M5 8h10M5 12h6M5 16h8"/></svg>
      <span>同步日志</span>
    </a>
    <a href="/settings" class="sidebar-link{% if active_nav == 'settings' %} active{% endif %}">
      <svg class="sidebar-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="2.5"/><path d="M10 2.5v2M10 15.5v2M2.5 10h2M15.5 10h2M4.8 4.8l1.4 1.4M13.8 13.8l1.4 1.4M4.8 15.2l1.4-1.4M13.8 6.2l1.4-1.4"/></svg>
      <span>设置</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="切换浅色/深色主题">
      <svg class="theme-icon theme-icon-sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="3.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/></svg>
      <svg class="theme-icon theme-icon-moon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15.5 11.5a5.5 5.5 0 0 1-7-7 5.5 5.5 0 1 0 7 7z"/></svg>
      <span class="theme-toggle-label">浅色模式</span>
    </button>
    <span class="sidebar-version">v5.0</span>
  </div>
</aside>
<div id="sync-live-bar" class="sync-live-bar" style="display:none" role="status" aria-live="polite">
  <span class="sync-live-dot"></span>
  <span id="sync-live-text">同步中...</span>
</div>
<script src="/static/app.js"></script>
